name: Build and deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.164.0
      HUGO_PARAMS_EDITPOST_URL: "https://github.com/${{ github.repository }}/edit/main/content"
      TZ: Australia/Melbourne
    steps:
      - name: Checkout source and theme
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo
        shell: bash
        run: |
          curl -fsSLo "${RUNNER_TEMP}/hugo.tar.gz" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf "${RUNNER_TEMP}/hugo.tar.gz" -C "${RUNNER_TEMP}" hugo
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Build production site
        run: >-
          hugo build
          --gc
          --minify
          --baseURL "${{ steps.pages.outputs.base_url }}/"
          --cacheDir "${RUNNER_TEMP}/hugo_cache"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
