<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-labelledby="title desc">
  <title id="title">Internal performance observations before and after the combined pipeline</title>
  <desc id="desc">A non-causal internal comparison observed recall of approximately 30 percent for the baseline and 70 percent after the combined pipeline; observed precision was approximately 90 percent in both evaluations.</desc>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 14px; fill: #6b7280; }
    .axis { font-size: 12px; fill: #6b7280; }
    .metric { font-size: 17px; font-weight: 700; fill: #111827; }
    .value { font-size: 16px; font-weight: 700; }
    .legend { font-size: 13px; fill: #4b5563; }
    .callout-title { font-size: 20px; font-weight: 700; fill: #166534; }
    .callout-body { font-size: 13px; fill: #166534; }
  </style>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="#ffffff"/>
  <text class="title" x="40" y="42">Internal observations before and after the combined pipeline</text>
  <text class="subtitle" x="40" y="68">Rounded figures; not a controlled like-for-like comparison</text>

  <!-- Axis grid -->
  <line x1="210" y1="115" x2="810" y2="115" stroke="#d1d5db" stroke-width="1.5"/>
  <g>
    <line x1="210" y1="105" x2="210" y2="395" stroke="#e5e7eb"/>
    <line x1="330" y1="105" x2="330" y2="395" stroke="#e5e7eb"/>
    <line x1="450" y1="105" x2="450" y2="395" stroke="#e5e7eb"/>
    <line x1="570" y1="105" x2="570" y2="395" stroke="#e5e7eb"/>
    <line x1="690" y1="105" x2="690" y2="395" stroke="#e5e7eb"/>
    <line x1="810" y1="105" x2="810" y2="395" stroke="#e5e7eb"/>
    <text class="axis" x="210" y="98" text-anchor="middle">0%</text>
    <text class="axis" x="330" y="98" text-anchor="middle">20%</text>
    <text class="axis" x="450" y="98" text-anchor="middle">40%</text>
    <text class="axis" x="570" y="98" text-anchor="middle">60%</text>
    <text class="axis" x="690" y="98" text-anchor="middle">80%</text>
    <text class="axis" x="810" y="98" text-anchor="middle">100%</text>
  </g>

  <!-- Recall -->
  <text class="metric" x="40" y="175">Recall</text>
  <rect x="210" y="143" width="180" height="34" rx="7" fill="#d1d5db"/>
  <text class="value" x="400" y="166" fill="#4b5563">30%</text>
  <rect x="210" y="190" width="420" height="34" rx="7" fill="#2563eb" filter="url(#shadow)"/>
  <text class="value" x="610" y="213" text-anchor="end" fill="#ffffff">70%</text>

  <!-- Precision -->
  <text class="metric" x="40" y="305">Precision</text>
  <rect x="210" y="273" width="540" height="34" rx="7" fill="#d1d5db"/>
  <text class="value" x="760" y="296" fill="#4b5563">90%</text>
  <rect x="210" y="320" width="540" height="34" rx="7" fill="#2563eb" filter="url(#shadow)"/>
  <text class="value" x="760" y="343" fill="#2563eb">90%</text>

  <!-- Legend -->
  <rect x="210" y="383" width="18" height="18" rx="4" fill="#d1d5db"/>
  <text class="legend" x="238" y="397">Heuristic-label baseline</text>
  <rect x="440" y="383" width="18" height="18" rx="4" fill="#2563eb"/>
  <text class="legend" x="468" y="397">Combined-pipeline student</text>

  <!-- Callout -->
  <rect x="670" y="145" width="250" height="100" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text class="callout-title" x="795" y="179" text-anchor="middle">Observed difference</text>
  <text class="callout-body" x="795" y="205" text-anchor="middle">+40 recall points; precision</text>
  <text class="callout-body" x="795" y="225" text-anchor="middle">was approximately 90% in both.</text>

  <line x1="40" y1="445" x2="920" y2="445" stroke="#e5e7eb"/>
  <text class="subtitle" x="40" y="477">Internal, non-causal observation from the original project; figures are rounded.</text>
  <text class="subtitle" x="40" y="500">Underwriting is only the article's explanatory analogy.</text>
</svg>
