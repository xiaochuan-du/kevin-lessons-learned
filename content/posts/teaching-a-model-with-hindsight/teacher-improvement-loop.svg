<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1160" width="960" height="1160" role="img" aria-labelledby="title desc">
  <title id="title">Teacher monitoring as a controlled improvement loop</title>
  <desc id="desc">Fresh human audit labels are compared with delayed teacher predictions. The team diagnoses annotation change, population change, or a feature gap, applies the matching intervention, updates a teacher candidate, and validates it out of time. Failed candidates return to diagnosis; passing candidates refresh silver labels and the student before the next audit cycle.</desc>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 25px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 15px; fill: #6b7280; }
    .node-title { font-size: 17px; font-weight: 700; fill: #111827; }
    .body { font-size: 14px; fill: #4b5563; }
    .small { font-size: 12px; fill: #6b7280; }
    .label { font-size: 12px; font-weight: 600; }
    .legend { font-size: 12px; fill: #4b5563; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="960" height="1160" fill="#ffffff"/>
  <text class="title" x="36" y="40">Teacher monitoring as a controlled improvement loop</text>
  <text class="subtitle" x="36" y="66">Disagreement triggers diagnosis; only validated candidates refresh supervision.</text>

  <!-- Compact legend -->
  <g transform="translate(520 82)">
    <line x1="0" y1="7" x2="25" y2="7" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
    <text class="legend" x="34" y="11">Audit</text>
    <line x1="105" y1="7" x2="130" y2="7" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
    <text class="legend" x="139" y="11">Diagnose / retry</text>
    <line x1="0" y1="34" x2="25" y2="34" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
    <text class="legend" x="34" y="38">Candidate path</text>
    <line x1="190" y1="34" x2="215" y2="34" stroke="#9333ea" stroke-width="2.2" marker-end="url(#arrow-purple)"/>
    <text class="legend" x="224" y="38">Next cycle</text>
  </g>

  <!-- Audit and comparison -->
  <rect x="35" y="145" width="285" height="105" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="72" cy="181" r="17" fill="#2563eb"/>
  <path d="M64 182 L70 188 L81 174" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="node-title" x="102" y="187">Fresh human audit</text>
  <text class="body" x="61" y="219">Independent, versioned sample</text>
  <text class="small" x="61" y="240">Human labels and subtypes</text>

  <rect x="640" y="145" width="285" height="105" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="2" filter="url(#shadow)"/>
  <text class="node-title" x="783" y="184" text-anchor="middle">Compare judgements</text>
  <text class="body" x="783" y="216" text-anchor="middle">Errors by time and segment</text>
  <text class="small" x="783" y="239" text-anchor="middle">Subtype · calibration · disagreement</text>

  <path d="M320 197 H625" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <rect x="432" y="184" width="82" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text class="label" x="473" y="197" text-anchor="middle" fill="#2563eb">audit sample</text>

  <!-- Diagnosis decision -->
  <polygon points="480,290 600,360 480,430 360,360" fill="#faf5ff" stroke="#c4b5fd" stroke-width="2" filter="url(#shadow)"/>
  <text class="node-title" x="480" y="354" text-anchor="middle">What changed?</text>
  <text class="small" x="480" y="378" text-anchor="middle">Diagnose before acting</text>

  <path d="M783 250 V270 H480 V275" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <rect x="605" y="257" width="83" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text class="label" x="647" y="270" text-anchor="middle" fill="#2563eb">error patterns</text>

  <!-- Diagnosis branches -->
  <path d="M420 400 V455 H160 V485" fill="none" stroke="#ea580c" stroke-width="2.3" marker-end="url(#arrow-orange)"/>
  <rect x="259" y="442" width="76" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text class="label" x="297" y="455" text-anchor="middle" fill="#ea580c">rubric drift</text>

  <path d="M480 430 V485" fill="none" stroke="#ea580c" stroke-width="2.3" marker-end="url(#arrow-orange)"/>
  <rect x="437" y="448" width="86" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text class="label" x="480" y="461" text-anchor="middle" fill="#ea580c">new patterns</text>

  <path d="M540 400 V455 H800 V485" fill="none" stroke="#ea580c" stroke-width="2.3" marker-end="url(#arrow-orange)"/>
  <rect x="653" y="442" width="104" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text class="label" x="705" y="455" text-anchor="middle" fill="#ea580c">missing context</text>

  <!-- Diagnosis-specific interventions -->
  <rect x="30" y="500" width="260" height="120" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.8"/>
  <text class="node-title" x="160" y="537" text-anchor="middle">Annotation change</text>
  <text class="body" x="160" y="570" text-anchor="middle">Align rubric and reviewers</text>
  <text class="body" x="160" y="596" text-anchor="middle">Create bridge labels</text>

  <rect x="350" y="500" width="260" height="120" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="1.8"/>
  <text class="node-title" x="480" y="537" text-anchor="middle">Population change</text>
  <text class="body" x="480" y="570" text-anchor="middle">Sample representative cases</text>
  <text class="body" x="480" y="596" text-anchor="middle">Refresh coverage</text>

  <rect x="670" y="500" width="260" height="120" rx="12" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.8"/>
  <text class="node-title" x="800" y="537" text-anchor="middle">Feature gap</text>
  <text class="body" x="800" y="570" text-anchor="middle">Add candidate feature</text>
  <text class="body" x="800" y="596" text-anchor="middle">Run controlled experiment</text>

  <!-- Shared teacher candidate -->
  <path d="M160 620 V650 H390 V675" fill="none" stroke="#16a34a" stroke-width="2.3" marker-end="url(#arrow-green)"/>
  <path d="M480 620 V675" fill="none" stroke="#16a34a" stroke-width="2.3" marker-end="url(#arrow-green)"/>
  <path d="M800 620 V650 H570 V675" fill="none" stroke="#16a34a" stroke-width="2.3" marker-end="url(#arrow-green)"/>

  <rect x="300" y="690" width="360" height="90" rx="12" fill="#f0fdfa" stroke="#5eead4" stroke-width="2" filter="url(#shadow)"/>
  <text class="node-title" x="480" y="727" text-anchor="middle">Update teacher candidate</text>
  <text class="body" x="480" y="757" text-anchor="middle">Re-label, retrain or add the tested feature</text>

  <!-- Validation gate -->
  <path d="M480 780 V810" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <rect x="260" y="825" width="440" height="110" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="307" cy="865" r="18" fill="#16a34a"/>
  <path d="M299 866 L305 872 L316 858" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="node-title" x="339" y="871">Out-of-time validation gate</text>
  <text class="body" x="307" y="903">Fresh human labels · calibration · important slices</text>
  <text class="small" x="307" y="924">Failed candidates return to diagnosis</text>

  <!-- Failure returns to diagnosis -->
  <path d="M260 880 H18 V360 H345" fill="none" stroke="#ea580c" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#arrow-orange)"/>
  <rect x="19" y="646" width="77" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text class="label" x="58" y="659" text-anchor="middle" fill="#ea580c">fails: revise</text>

  <!-- Passing candidate refreshes supervision -->
  <path d="M480 935 V965" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <rect x="442" y="941" width="76" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text class="label" x="480" y="954" text-anchor="middle" fill="#16a34a">passes gates</text>

  <rect x="300" y="980" width="360" height="90" rx="12" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text class="node-title" x="480" y="1017" text-anchor="middle">Refresh supervision</text>
  <text class="body" x="480" y="1047" text-anchor="middle">Regenerate silver labels · retrain student</text>

  <!-- Next cycle -->
  <path d="M660 1025 H900 Q945 1025 945 980 V160 Q945 125 910 125 H178 Q160 125 160 145" fill="none" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <rect x="370" y="113" width="105" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text class="label" x="423" y="126" text-anchor="middle" fill="#9333ea">next audit cycle</text>

  <text class="subtitle" x="36" y="1138">Underwriting is illustrative; the improvement loop is the reusable system pattern.</text>
</svg>
